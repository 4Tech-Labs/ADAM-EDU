# Local development stack for ADAM-EDU.
# Two common workflows:
# 1. Recommended day-to-day development: run only `adam-edu-postgres` and start backend/frontend locally.
# 2. Full containerized stack: run the whole compose file and let Docker build the API image from the repo root.

name: adam-edu

volumes:
  adam-edu-postgres-data:
    driver: local

services:
  adam-edu-postgres:
    image: docker.io/postgres:16
    container_name: adam-edu-postgres
    restart: unless-stopped
    ports:
      # Host port 5434 is the repo's app/authoring DB. Container port 5432 stays internal to Docker.
      - "${POSTGRES_HOST_PORT:-5434}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - adam-edu-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-postgres}"]
      start_period: 10s
      timeout: 5s
      retries: 5
      interval: 5s

  adam-edu-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: adam-edu-api:local
    container_name: adam-edu-api
    restart: unless-stopped
    depends_on:
      adam-edu-postgres:
        condition: service_healthy
    ports:
      - "${API_HOST_PORT:-8123}:8000"
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@adam-edu-postgres:5432/${POSTGRES_DB:-postgres}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      LANGSMITH_API_KEY: ${LANGSMITH_API_KEY:-}
      # Optional only: when the API runs in Docker and auth runs on the host via Supabase CLI,
      # inject a host-reachable URL such as http://host.docker.internal:54321. Do not use localhost here.
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}
      SUPABASE_JWT_SECRET: ${SUPABASE_JWT_SECRET:-}
